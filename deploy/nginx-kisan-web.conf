# Nginx config for Next.js app domain: kisan.net.np and kisannet.com
# Place this file in /etc/nginx/sites-available/kisan-web and enable it with a symlink.

server {
    listen 80;
    server_name kisan.net.np kisannet.com www.kisan.net.np www.kisannet.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kisan.net.np kisannet.com www.kisan.net.np www.kisannet.com;

    root /var/www/kisan-web;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/kisan.net.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kisan.net.np/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy requests to the Next.js production server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve static assets directly if available
    location /_next/static/ {
        alias /var/www/kisan-web/.next/static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static/ {
        alias /var/www/kisan-web/public/;
        access_log off;
        expires 1d;
    }

    location /favicon.ico {
        alias /var/www/kisan-web/public/favicon.ico;
        access_log off;
    }

    location /robots.txt {
        alias /var/www/kisan-web/public/robots.txt;
        access_log off;
    }
}
