# Nginx config for Next.js app: kisan.net.np
# Place this file in /etc/nginx/sites-available/kisan-web
# Then: sudo ln -s /etc/nginx/sites-available/kisan-web /etc/nginx/sites-enabled/
# Finally: sudo certbot --nginx -d kisan.net.np -d www.kisan.net.np

server {
    listen 80;
    server_name kisan.net.np www.kisan.net.np;

    # Redirect HTTP to HTTPS
    if ($host = www.kisan.net.np) {
        return 301 https://$host$request_uri;
    }
    if ($host = kisan.net.np) {
        return 301 https://$host$request_uri;
    }
    return 404;
}

server {
    server_name kisan.net.np www.kisan.net.np;

    root /var/www/kisan-web;
    index index.html;

    # =========================
    # Proxy to Next.js server
    # =========================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # =========================
    # Static Next.js Assets
    # =========================
    location /_next/static/ {
        alias /var/www/kisan-web/.next/static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # =========================
    # Public Files
    # =========================
    location /public/ {
        alias /var/www/kisan-web/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =========================
    # Static File Cache
    # =========================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # =========================
    # GZIP Compression
    # =========================
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # SSL certificates managed by Certbot
    listen 443 ssl http2;
}
